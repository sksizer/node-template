# Published-package hygiene. A HARD gate: builds the package, then runs publint
# (validates package.json packaging — exports/main/types/files) and
# are-the-types-wrong (packs the tarball and checks the emitted .d.ts resolve for
# consumers). Fails the PR on any packaging or type-resolution regression, so a
# broken published artifact is caught before `npm publish`.
#
# Kept in its own workflow (not a step in ci.yml) so this release-readiness gate
# is independent of the core build/test gate. The package-check script builds
# first, so publint/attw always lint fresh dist/.
name: Package Quality

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  package-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package check (publint + are-the-types-wrong)
        run: npm run package-check
