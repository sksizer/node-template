# Dependency vulnerability audit. Scans the resolved tree (package-lock.json)
# against the npm advisory database on every PR and push to main.
#
# Threshold — HIGH: `npm audit --audit-level=high` fails only on a high or
# critical advisory; low/moderate are reported but non-blocking. A bare
# `npm audit` fails on any advisory (down to low), so the flag sets the gate.
#
# Kept in its own workflow (not a step in ci.yml) because it queries the advisory
# DB over the network, unlike the offline build/test gate. No `npm ci` needed:
# `npm audit` resolves straight from the committed lockfile.
name: Audit

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Audit dependencies
        run: npm run audit
