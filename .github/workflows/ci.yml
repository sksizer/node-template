# The core gate. Runs on every pull request and every push to main, and turns the
# local quality scripts (Biome, tsc, bun test + coverage, build) into an enforced,
# blocking check. If any step fails, the PR cannot merge.
name: CI

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Bun version comes from .bun-version so local and CI resolve the same
      # release. Bun is the dev toolchain: installer, script runner, test runner.
      # (tsc/biome and the published artifact still target Node — engines.node.)
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      # --frozen-lockfile installs exactly the committed bun.lock — reproducible,
      # and fails if the lockfile is out of sync with package.json.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Biome: format + lint + import-organization in CI (no-write) mode.
      - name: Lint & format check
        run: bun run check:ci

      - name: Typecheck
        run: bun run typecheck

      # bun test with coverage — enforces the thresholds in bunfig.toml and
      # subsumes a bare test run.
      - name: Test with coverage
        run: bun run coverage

      # Compile the publishable artifact; catches build-only breakage.
      - name: Build
        run: bun run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
